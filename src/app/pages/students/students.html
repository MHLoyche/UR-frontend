<section class="students">
	<h1>Students</h1>

	<table class="students-table" *ngIf="students$ | async as students; else loading">
		<thead>
			<tr>
				<th>Student Number</th>
				<th>Name</th>
				<th>Class</th>
				<th>Email</th>
				<th>Address</th>
				<th>Postal Code / City</th>
				<th>CPR Number</th>
			</tr>
		</thead>

		<tbody>
			<tr *ngFor="let student of students">
				<td>{{ student.elevnummer }}</td>
				<td>{{ student.navn }}</td>
				<td>{{ student.stamklasse }}</td>
				<td>{{ student.email }}</td>
				<td>{{ student.adresse }}</td>
				<td>{{ student.postnummerOgBy }}</td>
				<td>{{ student.cprNummer }}</td>
			</tr>
		</tbody>
	</table>

	<ng-template #loading>
		<p>Loading students...</p>
	</ng-template>
</section>
