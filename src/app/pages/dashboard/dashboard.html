<h1>Dashboard</h1>

<section class="div-container">
    <div id="inventory-div" class="stat-card">
        <h2>Inventory Overview</h2>

        <div class="inventory-stats">
            <span class="stat-label">Computers:</span>
            <span class="stat-value">{{ counts().computers }}</span>
        </div>
        <div class="inventory-stats">
            <span class="stat-label">Mice:</span>
            <span class="stat-value">{{ counts().mice }}</span>
        </div>
    </div>
    
    <div id="loans-div" class="stat-card">
        <h2>Loans Overview</h2>

        <div class="loans-stats">
            <span class="stat-label">Active Loans:</span>
            <span class="stat-value">{{ counts().activeLoans }}</span> 
            <span class="stat-label">Overdue Loans:</span>
            <span class="stat-value">{{ counts().overdueLoans }}</span>
        </div>
    </div>

    <div id="cases-div" class="stat-card">
        <h2>Cases</h2>
    </div>

    <div id="students-div" class="stat-card">
        <h2>Students</h2>
    </div> 
</section>
