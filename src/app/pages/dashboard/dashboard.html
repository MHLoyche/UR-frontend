<h1>Dashboard</h1>

<section class="div-container">
    <div id="inventory-div" class="stat-card">
        <h2>Inventory Overview</h2>

        <div class="inventory-stats">
            <span class="stat-label">Computers:</span>
            <span class="stat-value">{{ computersCount }}</span>
        </div>
        <div class="inventory-stats">
            <span class="stat-label">Mice:</span>
            <span class="stat-value">{{ miceCount }}</span>
        </div>
    </div>
    
    <div id="div2">
        <p>Dashboard Content 2</p>
    </div>
    <div id="div3">
        <p>Dashboard Content 3</p>
    </div>
    <div id="div4">
        <p>Dashboard Content 4</p>
    </div> 
</section>
